<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" width="720" height="300" font-family="'SF Mono','Consolas','Fira Code',Menlo,monospace">
  <!-- window -->
  <rect x="2" y="2" width="716" height="296" rx="12" fill="#1a1b26" stroke="#2f334d" stroke-width="1.5"/>
  <!-- title bar -->
  <path d="M2,46 V14 a12,12 0 0 1 12,-12 H706 a12,12 0 0 1 12,12 V46 Z" fill="#24283b"/>
  <circle cx="28" cy="24" r="7" fill="#ff5f56"/>
  <circle cx="50" cy="24" r="7" fill="#ffbd2e"/>
  <circle cx="72" cy="24" r="7" fill="#27c93f"/>
  <text x="360" y="29" text-anchor="middle" fill="#565f89" font-size="13">tyler@github ~ %</text>

  <!-- typing clip regions -->
  <defs>
    <clipPath id="l1"><rect x="18" y="68"  width="0" height="26">
      <animate attributeName="width" values="0;694;694" keyTimes="0;0.08;1" dur="9s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="l2"><rect x="18" y="100" width="0" height="26">
      <animate attributeName="width" values="0;0;694;694" keyTimes="0;0.10;0.18;1" dur="9s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="l3"><rect x="18" y="132" width="0" height="26">
      <animate attributeName="width" values="0;0;694;694" keyTimes="0;0.22;0.30;1" dur="9s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="l4"><rect x="18" y="164" width="0" height="26">
      <animate attributeName="width" values="0;0;694;694" keyTimes="0;0.34;0.42;1" dur="9s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="l5"><rect x="18" y="196" width="0" height="26">
      <animate attributeName="width" values="0;0;694;694" keyTimes="0;0.46;0.54;1" dur="9s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="l6"><rect x="18" y="228" width="0" height="26">
      <animate attributeName="width" values="0;0;694;694" keyTimes="0;0.58;0.66;1" dur="9s" repeatCount="indefinite"/></rect></clipPath>
  </defs>

  <g font-size="16">
    <text x="28" y="86"  clip-path="url(#l1)"><tspan fill="#7aa2f7" font-weight="bold">$ </tspan><tspan fill="#c0caf5">whoami</tspan></text>
    <text x="28" y="118" clip-path="url(#l2)" fill="#9ece6a">→ Tyler Norcross · Software Developer</text>
    <text x="28" y="150" clip-path="url(#l3)"><tspan fill="#7aa2f7" font-weight="bold">$ </tspan><tspan fill="#c0caf5">cat focus.txt</tspan></text>
    <text x="28" y="182" clip-path="url(#l4)" fill="#9ece6a">→ Building AI agents and full-stack apps that ship.</text>
    <text x="28" y="214" clip-path="url(#l5)"><tspan fill="#7aa2f7" font-weight="bold">$ </tspan><tspan fill="#c0caf5">status </tspan><tspan fill="#bb9af7">--hire</tspan></text>
    <text x="28" y="246" clip-path="url(#l6)" fill="#9ece6a">→ Open to new opportunities.</text>
  </g>

  <!-- blinking cursor -->
  <rect x="300" y="232" width="9" height="17" fill="#9ece6a">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
